<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIZE ANALYZER PRO - 落下速度特定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .rod-animation { animation: drop var(--drop-time) ease-in forwards; }
        @keyframes drop {
            0% { transform: translateY(0); }
            100% { transform: translateY(160px); }
        }
        .disk-rotate { animation: rotate var(--period) linear infinite; }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-zinc-950 text-slate-200 font-mono p-4 flex flex-col items-center">

    <div class="max-w-md w-full bg-zinc-900 border-2 border-red-600 rounded-2xl p-6 shadow-2xl">
        <h1 class="text-center text-red-500 font-black text-xl mb-6 italic italic">DROP VELOCITY ANALYZER</h1>

        <div class="relative w-64 h-64 mx-auto mb-8 bg-black rounded-full border-4 border-zinc-800 overflow-hidden">
            <div id="target-disk" class="absolute inset-0 flex justify-center">
                <div class="w-8 h-8 bg-emerald-500 rounded-full mt-2 shadow-[0_0_15px_#10b981]"></div>
            </div>
            <div id="red-rod" class="absolute top-0 left-1/2 -translate-x-1/2 w-4 h-12 bg-red-600 shadow-[0_0_10px_#dc2626] z-10"></div>
            <div class="absolute top-[160px] w-full border-t border-dashed border-zinc-600"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-zinc-800 p-3 rounded-lg">
                <label class="text-[10px] text-zinc-500 block">回転周期 (秒/周)</label>
                <input type="number" id="input-period" value="3.50" step="0.01" class="bg-transparent text-xl text-white w-full outline-none">
            </div>
            <div class="bg-zinc-800 p-3 rounded-lg border border-red-900/50">
                <label class="text-[10px] text-red-500 block text-center font-bold underline">落下時間 (秒)</label>
                <input type="number" id="input-drop" value="0.45" step="0.01" class="bg-transparent text-xl text-red-500 w-full text-center font-bold outline-none">
            </div>
        </div>

        <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 mb-6 text-center">
            <p class="text-[10px] text-zinc-400">必要な「見越し角」</p>
            <div id="result-angle" class="text-4xl font-black text-white">0.0°</div>
            <p class="text-[10px] text-zinc-500 mt-2">※ターゲットがこの角度手前に来た時に押せ！</p>
        </div>

        <div class="flex gap-2">
            <button id="test-btn" class="flex-1 py-4 bg-red-600 hover:bg-red-500 active:scale-95 rounded-xl font-bold transition-all shadow-lg">
                DROP TEST (押す)
            </button>
        </div>

        <div class="mt-6 text-[10px] text-zinc-500 leading-relaxed border-t border-zinc-800 pt-4">
            【攻略手順】<br>
            1. 実機の円盤の周期を前回のツール等で測り、入力する。<br>
            2. 「落下時間」を微調整しながら、実機の棒の降りる速さと画面を同期させる。<br>
            3. 算出された「見越し角」の位置にターゲットが来たら、迷わず押す。
        </div>
    </div>

    <script>
        const rod = document.getElementById('red-rod');
        const disk = document.getElementById('target-disk');
        const inputPeriod = document.getElementById('input-period');
        const inputDrop = document.getElementById('input-drop');
        const resultAngle = document.getElementById('result-angle');

        function updateValues() {
            const period = parseFloat(inputPeriod.value) || 1;
            const dropTime = parseFloat(inputDrop.value) || 0;
            
            // 回転速度と落下時間から、ボタンを押すべき角度（見越し角）を計算
            // 360度 * (落下時間 / 1周の時間)
            const leadAngle = (360 * (dropTime / period)).toFixed(1);
            resultAngle.innerText = leadAngle + "°";

            // アニメーション反映
            disk.style.setProperty('--period', `${period}s`);
            disk.classList.remove('disk-rotate');
            void disk.offsetWidth;
            disk.classList.add('disk-rotate');
        }

        document.getElementById('test-btn').addEventListener('click', () => {
            const dropTime = inputDrop.value;
            rod.style.setProperty('--drop-time', `${dropTime}s`);
            
            rod.classList.remove('rod-animation');
            void rod.offsetWidth;
            rod.classList.add('rod-animation');
        });

        [inputPeriod, inputDrop].forEach(el => el.addEventListener('input', updateValues));
        updateValues();
    </script>
</body>
</html>
