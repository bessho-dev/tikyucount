<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME ATTACK 2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap');
        .mono { font-family: 'JetBrains Mono', monospace; }
        .player-area { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col overflow-hidden">

    <div id="p2-area" class="flex-1 bg-zinc-900 flex flex-col items-center justify-center rotate-180 border-b border-zinc-800 relative">
        <div class="absolute top-4 text-[10px] tracking-[0.5em] text-zinc-500 uppercase">Player 2</div>
        <div id="p2-result" class="text-6xl mono mb-4 text-zinc-700">0.000</div>
        <button id="p2-btn" class="px-12 py-6 bg-red-600 rounded-2xl font-black text-xl active:scale-95 transition-transform">STOP</button>
    </div>

    <div class="bg-white text-black py-2 px-6 flex justify-between items-center font-bold italic">
        <span>TARGET: <span id="target-time">5.00</span>s</span>
        <button id="reset-btn" class="bg-black text-white px-4 py-1 text-xs rounded-full">RESET</button>
        <span>VS MODE</span>
    </div>

    <div id="p1-area" class="flex-1 bg-zinc-900 flex flex-col items-center justify-center border-t border-zinc-800 relative">
        <div class="absolute top-4 text-[10px] tracking-[0.5em] text-zinc-500 uppercase">Player 1</div>
        <div id="p1-result" class="text-6xl mono mb-4 text-zinc-700">0.000</div>
        <button id="p1-btn" class="px-12 py-6 bg-blue-600 rounded-2xl font-black text-xl active:scale-95 transition-transform">STOP</button>
    </div>

    <script>
        let target = 5.00;
        let p1Start, p2Start;
        let p1Score = null, p2Score = null;

        const p1Btn = document.getElementById('p1-btn');
        const p2Btn = document.getElementById('p2-btn');
        const p1Res = document.getElementById('p1-result');
        const p2Res = document.getElementById('p2-result');

        function startRound() {
            target = (Math.random() * 3 + 3).toFixed(2); // 3〜6秒のランダム
            document.getElementById('target-time').innerText = target;
            p1Score = p2Score = null;
            p1Res.innerText = "READY";
            p2Res.innerText = "READY";
            p1Res.className = p2Res.className = "text-6xl mono mb-4 text-zinc-500";
            p1Btn.innerText = p2Btn.innerText = "START";
        }

        function handleTap(player) {
            const now = performance.now();
            if (player === 1) {
                if (p1Btn.innerText === "START") {
                    p1Start = now; p1Btn.innerText = "STOP"; p1Res.innerText = "WAIT...";
                } else if (p1Score === null) {
                    p1Score = (now - p1Start) / 1000;
                    p1Res.innerText = p1Score.toFixed(3);
                    checkWinner();
                }
            } else {
                if (p2Btn.innerText === "START") {
                    p2Start = now; p2Btn.innerText = "STOP"; p2Res.innerText = "WAIT...";
                } else if (p2Score === null) {
                    p2Score = (now - p2Start) / 1000;
                    p2Res.innerText = p2Score.toFixed(3);
                    checkWinner();
                }
            }
        }

        function checkWinner() {
            if (p1Score !== null && p2Score !== null) {
                const diff1 = Math.abs(target - p1Score);
                const diff2 = Math.abs(target - p2Score);
                if (diff1 < diff2) {
                    p1Res.classList.add('text-emerald-400');
                    document.getElementById('p1-area').classList.add('bg-emerald-950');
                } else {
                    p2Res.classList.add('text-emerald-400');
                    document.getElementById('p2-area').classList.add('bg-emerald-950');
                }
            }
        }

        p1Btn.addEventListener('click', () => handleTap(1));
        p2Btn.addEventListener('click', () => handleTap(2));
        document.getElementById('reset-btn').addEventListener('click', () => {
            document.getElementById('p1-area').classList.remove('bg-emerald-950');
            document.getElementById('p2-area').classList.remove('bg-emerald-950');
            startRound();
        });

        startRound();
    </script>
</body>
</html>
